services:

  cv:
    image: agosalvez/cv:latest
    restart: unless-stopped
    ports:
      - "8082:80"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4322:4322"
    volumes:
      - ./src/data:/app/src/data          # cv.json compartido
      - ./public/logos:/app/public/logos  # logos subidos
      - ./public/profile.jpg:/app/public/profile.jpg
    environment:
      - ADMIN_USER=${ADMIN_USER:-agosalvez}
      - ADMIN_PASS=${ADMIN_PASS}
