services:

  cv:
    image: ${DOCKERHUB_USERNAME}/cv:latest
    restart: unless-stopped
    ports:
      - "8082:4322"
    volumes:
      - cv-data:/app/src/data
      - cv-public:/app/public
    environment:
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}

volumes:
  cv-data:    # cv.json
  cv-public:  # profile.jpg y logos/
