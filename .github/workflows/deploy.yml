name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Build CV (nginx estático) ──────────────────────────────
  build-cv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            agosalvez/cv:latest
            agosalvez/cv:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Admin (Express) ──────────────────────────────────
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          tags: |
            agosalvez/cv-admin:latest
            agosalvez/cv-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy en Portainer via webhook ───────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-cv, build-admin]
    steps:
      - name: Trigger Portainer webhook
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            --fail --show-error
          echo "Deploy triggered ✓"
